<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | HOMES Anam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;--gray:#6F7A83;--soft:#f6f7f9;--ink:#2d2d2d;--muted:#888;--red:#e53e3e;--green:#38a169;--font:'Outfit','Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--soft);color:var(--ink);}
header{background:var(--navy);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;}
.h-left{display:flex;align-items:center;gap:10px;}
.h-logo{color:#fff;font-weight:800;font-size:18px;}
.h-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;}
.h-right{display:flex;gap:8px;}
.btn{font-family:var(--font);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-ghost-w{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-ghost-w:hover{background:rgba(255,255,255,.2);}
.btn-outline{background:#fff;color:var(--ink);border:1px solid var(--line);}
.btn-outline:hover{background:var(--soft);}
.btn-danger{background:#fff0f0;color:var(--red);border:1px solid #ffd5d5;}
.btn-danger:hover{background:#ffe0e0;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.tabs{display:flex;border-bottom:2px solid var(--line);padding:0 28px;background:#fff;}
.tab{padding:14px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.main{max-width:920px;margin:0 auto;padding:28px 24px 80px;}
.panel{display:none;}.panel.active{display:block;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
input[type=text],input[type=url],textarea,select{font-family:var(--font);font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:#fff;width:100%;outline:none;transition:border-color .15s;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:var(--navy);}
textarea{min-height:72px;}
.hint{font-size:11px;color:var(--muted);margin-top:3px;}
.sw-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);}
.sw{position:relative;width:38px;height:22px;flex-shrink:0;}
.sw input{display:none;}
.sl{position:absolute;inset:0;background:var(--line);border-radius:22px;cursor:pointer;transition:.2s;}
.sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;}
.sw input:checked+.sl{background:var(--green);}
.sw input:checked+.sl::before{transform:translateX(16px);}
.acc-item{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
.acc-head:hover{background:#fafafa;}
.acc-num{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.acc-info{flex:1;}
.acc-name{font-size:14px;font-weight:700;}
.acc-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.acc-body{border-top:1px solid var(--line);padding:18px;display:none;}
.acc-body.open{display:block;}
.chv{transition:transform .2s;color:var(--muted);}
.chv.open{transform:rotate(180deg);}
.badge-row{display:flex;gap:10px;flex-wrap:wrap;}
.btog{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);cursor:pointer;font-size:13px;font-weight:700;background:#fff;transition:.15s;user-select:none;color:var(--muted);}
.btog.on-tour{background:#22863a;color:#fff;border-color:#22863a;}
.btog.on-contract{background:#1a56db;color:#fff;border-color:#1a56db;}
.btog.on-novacancy{background:#e53e3e;color:#fff;border-color:#e53e3e;}
.pi{display:flex;gap:12px;align-items:flex-start;padding:12px;background:var(--soft);border-radius:10px;margin-bottom:8px;}
.pi-body{flex:1;}
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(6px);transition:.22s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.ok{background:var(--green);}
#toast.err{background:var(--red);}
@media(max-width:600px){.fr{grid-template-columns:1fr;}header,.tabs{padding-left:14px;padding-right:14px;}.main{padding:18px 12px 60px;}}
</style>
</head>
<body>
<header>
  <div class="h-left"><span class="h-logo">HOMES Anam</span><span class="h-badge">ADMIN</span></div>
  <div class="h-right">
    <a class="btn btn-ghost-w" href="index.html" target="_blank">↗ 홈</a>
    <a class="btn btn-ghost-w" href="process.html" target="_blank">↗ 계약단계</a>
    <a class="btn btn-ghost-w" href="info.html" target="_blank">↗ 상세정보</a>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('main',this)">메인페이지</button>
  <button class="tab" onclick="switchTab('process',this)">계약 단계</button>
  <button class="tab" onclick="switchTab('info',this)">상세 정보</button>
</div>
<div class="main">

  <!-- MAIN -->
  <div class="panel active" id="panel-main">
    <div class="card">
      <div class="card-title">팝업 이미지<button class="btn btn-outline btn-sm" onclick="addPopup()">+ 추가</button></div>
      <div id="popup-list"></div>
      <div class="hint" style="margin-top:6px;">Google Drive 공유 링크를 그대로 붙여넣으면 자동 변환됩니다.</div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;"><button class="btn btn-gold" onclick="savePopup()">팝업 저장</button></div>
    </div>
    <div class="card">
      <div class="card-title">유튜브 영상</div>
      <div class="fg"><label>YouTube URL</label><input type="url" id="yt-url" placeholder="https://www.youtube.com/watch?v=..."></div>
      <div style="margin-top:12px;display:flex;justify-content:flex-end;"><button class="btn btn-gold" onclick="saveYT()">저장</button></div>
    </div>
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div id="info-rows"></div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;"><button class="btn btn-gold" onclick="saveInfo()">저장</button></div>
    </div>
    <div class="card">
      <div class="card-title">
        공용공간
        <button class="btn btn-outline btn-sm" onclick="addSpace()">+ 추가</button>
      </div>
      <div id="spaces-list"></div>
    </div>
    <div class="card">
      <div class="card-title">호실 타입 카드</div>
      <div id="rooms-list"></div>
    </div>
  </div>

  <!-- PROCESS -->
  <div class="panel" id="panel-process">
    <div class="card">
      <div class="card-title">계약 단계 (11단계)</div>
      <div id="steps-list"></div>
    </div>
  </div>

  <!-- INFO -->
  <div class="panel" id="panel-info">
    <div class="card">
      <div class="card-title">카테고리<button class="btn btn-outline btn-sm" onclick="addCol()">+ 추가</button></div>
      <div id="cols-list"></div>
    </div>
    <div class="card">
      <div class="card-title">항목<button class="btn btn-outline btn-sm" onclick="addItem()">+ 추가</button></div>
      <div id="items-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const SB=supabase.createClient('https://zyeumxtemfmkbpviuxeo.supabase.co','sb_publishable_TuH7QP5ejpplWGn9OiSz3w_joV0ffWJ');
let openAcc={sp:null,rm:null,st:null,it:null};
let popupData=[],infoData=[],spacesData=[],roomsData=[],stepsData=[],colsData=[],itemsData=[];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');setTimeout(()=>t.className='',2800);}
function switchTab(id,el){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');el.classList.add('active');}
function tog(type,i){openAcc[type]=openAcc[type]===i?null:i;if(type==='sp')renderSpaces();else if(type==='rm')renderRooms();else if(type==='st')renderSteps();else if(type==='it')renderItems();}
function driveUrl(url){if(!url)return'';const m=url.match(/\/d\/([^/]+)/);return m?`https://drive.google.com/uc?export=view&id=${m[1]}`:url;}

/* ── POPUP ── */
async function loadPopup(){const{data}=await SB.from('anam_popup').select('*').order('sort_order');popupData=data||[];renderPopup();}
function renderPopup(){
  document.getElementById('popup-list').innerHTML=popupData.map((p,i)=>`
    <div class="pi">
      <div class="pi-body">
        <div class="fr" style="margin-bottom:8px;">
          <div class="fg"><label>캡션 (한국어)</label><input type="text" value="${esc(p.caption_ko)}" onchange="popupData[${i}].caption_ko=this.value"></div>
          <div class="fg"><label>Caption (EN)</label><input type="text" value="${esc(p.caption_en)}" onchange="popupData[${i}].caption_en=this.value"></div>
        </div>
        <div class="fg"><label>이미지 URL</label><input type="url" value="${esc(p.img)}" onchange="popupData[${i}].img=this.value"></div>
        <div class="sw-row" style="margin-top:8px;"><label class="sw"><input type="checkbox" ${p.is_active?'checked':''} onchange="popupData[${i}].is_active=this.checked"><div class="sl"></div></label>활성화</div>
      </div>
      <button class="btn btn-danger btn-sm" style="align-self:flex-start;flex-shrink:0;" onclick="deletePopup(${p.id},${i})">삭제</button>
    </div>`).join('');}
async function addPopup(){const{data}=await SB.from('anam_popup').insert({sort_order:popupData.length,img:'',caption_ko:'',caption_en:'',is_active:true}).select().single();if(data){popupData.push(data);renderPopup();}}
async function deletePopup(id,i){await SB.from('anam_popup').delete().eq('id',id);popupData.splice(i,1);renderPopup();toast('삭제됨');}
async function savePopup(){for(const p of popupData){await SB.from('anam_popup').update({img:p.img,caption_ko:p.caption_ko,caption_en:p.caption_en,is_active:p.is_active,sort_order:p.sort_order}).eq('id',p.id);}toast('팝업 저장됨','ok');}

/* ── YT ── */
async function loadYT(){const{data}=await SB.from('anam_settings').select('value').eq('key','youtube').single();if(data)document.getElementById('yt-url').value=data.value.replace('embed/','watch?v=');}
async function saveYT(){let v=document.getElementById('yt-url').value.trim();const m=v.match(/(?:v=|youtu\.be\/)([^&?/]+)/);if(m)v=`https://www.youtube.com/embed/${m[1]}`;await SB.from('anam_settings').upsert({key:'youtube',value:v});toast('저장됨','ok');}

/* ── INFO ── */
async function loadInfo(){const{data}=await SB.from('anam_settings').select('value').eq('key','info').single();if(data){infoData=JSON.parse(data.value||'[]');renderInfo();}}
function renderInfo(){
  document.getElementById('info-rows').innerHTML=infoData.map((r,i)=>`
    <div style="background:var(--soft);border-radius:10px;padding:12px;margin-bottom:8px;">
      <div class="fr" style="margin-bottom:8px;">
        <div class="fg"><label>항목명 (한국어)</label><input type="text" value="${esc(r.label_ko)}" onchange="infoData[${i}].label_ko=this.value"></div>
        <div class="fg"><label>Label (EN)</label><input type="text" value="${esc(r.label_en)}" onchange="infoData[${i}].label_en=this.value"></div>
      </div>
      <div class="fr" style="margin-bottom:0;">
        <div class="fg"><label>내용 (한국어)</label><input type="text" value="${esc(r.val_ko)}" onchange="infoData[${i}].val_ko=this.value"></div>
        <div class="fg"><label>Value (EN)</label><input type="text" value="${esc(r.val_en)}" onchange="infoData[${i}].val_en=this.value"></div>
      </div>
    </div>`).join('');}
async function saveInfo(){await SB.from('anam_settings').upsert({key:'info',value:JSON.stringify(infoData)});toast('기본정보 저장됨','ok');}

/* ── SPACES ── */
async function loadSpaces(){const{data}=await SB.from('anam_spaces').select('*').order('sort_order');spacesData=data||[];renderSpaces();}

function renderSpaces(){
  document.getElementById('spaces-list').innerHTML=spacesData.map((s,i)=>`
    <div class="acc-item">
      <div class="acc-head" onclick="tog('sp',${i})">
        <div class="acc-num">${i+1}</div>
        <div class="acc-info">
          <div class="acc-name">${esc(s.name_ko)||'<span style="color:var(--muted);font-weight:400;">이름 없음</span>'}</div>
          <div class="acc-sub">${esc(s.name_en)||'—'}</div>
        </div>
        <div style="display:flex;gap:4px;margin-right:8px;">
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();moveSpace(${i},-1)">↑</button>
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();moveSpace(${i},1)">↓</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSpace(${s.id},${i})">삭제</button>
        </div>
        <svg class="chv${openAcc.sp===i?' open':''}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="acc-body${openAcc.sp===i?' open':''}">
        <div class="fr">
          <div class="fg"><label>이름 (한국어)</label><input type="text" value="${esc(s.name_ko)}" onchange="spacesData[${i}].name_ko=this.value"></div>
          <div class="fg"><label>Name (EN)</label><input type="text" value="${esc(s.name_en)}" onchange="spacesData[${i}].name_en=this.value"></div>
        </div>
        <div class="fr">
          <div class="fg"><label>설명 (한국어)</label><textarea onchange="spacesData[${i}].desc_ko=this.value">${esc(s.desc_ko)}</textarea></div>
          <div class="fg"><label>Description (EN)</label><textarea onchange="spacesData[${i}].desc_en=this.value">${esc(s.desc_en)}</textarea></div>
        </div>
        <div class="fr">
          <div class="fg"><label>태그 한국어 (쉼표 구분)</label><input type="text" value="${esc(s.tags_ko)}" onchange="spacesData[${i}].tags_ko=this.value"></div>
          <div class="fg"><label>Tags EN (comma)</label><input type="text" value="${esc(s.tags_en)}" onchange="spacesData[${i}].tags_en=this.value"></div>
        </div>
        <div class="fg"><label>사진 URL (Google Drive)</label><input type="url" value="${esc(s.img)}" onchange="spacesData[${i}].img=this.value"></div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end;">
          <button class="btn btn-gold btn-sm" onclick="saveSpace(${i})">저장</button>
        </div>
      </div>
    </div>`).join('');}

async function addSpace(){
  const newSort=spacesData.length>0?Math.max(...spacesData.map(s=>s.sort_order||0))+1:0;
  const{data,error}=await SB.from('anam_spaces').insert({
    sort_order:newSort,
    name_ko:'새 공간',
    name_en:'New Space',
    desc_ko:'',
    desc_en:'',
    tags_ko:'',
    tags_en:'',
    img:''
  }).select().single();
  if(error){toast('오류: '+error.message,'err');return;}
  spacesData.push(data);
  openAcc.sp=spacesData.length-1;
  renderSpaces();
  toast('공간이 추가됐어요. 내용을 입력하고 저장하세요.','ok');
}

async function deleteSpace(id,i){
  if(!confirm(`"${spacesData[i].name_ko}" 공간을 삭제할까요?`))return;
  const{error}=await SB.from('anam_spaces').delete().eq('id',id);
  if(error){toast('오류: '+error.message,'err');return;}
  spacesData.splice(i,1);
  if(openAcc.sp===i)openAcc.sp=null;
  else if(openAcc.sp>i)openAcc.sp--;
  renderSpaces();
  toast('삭제됨');
}

async function moveSpace(i,dir){
  const n=i+dir;
  if(n<0||n>=spacesData.length)return;
  [spacesData[i].sort_order,spacesData[n].sort_order]=[spacesData[n].sort_order,spacesData[i].sort_order];
  await SB.from('anam_spaces').update({sort_order:spacesData[i].sort_order}).eq('id',spacesData[i].id);
  await SB.from('anam_spaces').update({sort_order:spacesData[n].sort_order}).eq('id',spacesData[n].id);
  [spacesData[i],spacesData[n]]=[spacesData[n],spacesData[i]];
  if(openAcc.sp===i)openAcc.sp=n;
  else if(openAcc.sp===n)openAcc.sp=i;
  renderSpaces();
}

async function saveSpace(i){
  const s=spacesData[i];
  const{error}=await SB.from('anam_spaces').update({
    name_ko:s.name_ko,name_en:s.name_en,
    desc_ko:s.desc_ko,desc_en:s.desc_en,
    tags_ko:s.tags_ko,tags_en:s.tags_en,
    img:s.img
  }).eq('id',s.id);
  if(error)toast('오류: '+error.message,'err');
  else{openAcc.sp=i;renderSpaces();toast('저장됨','ok');}
}

/* ── ROOMS ── */
async function loadRooms(){const{data}=await SB.from('anam_rooms').select('*').order('sort_order');roomsData=data||[];renderRooms();}
function renderRooms(){
  document.getElementById('rooms-list').innerHTML=roomsData.map((r,i)=>`
    <div class="acc-item">
      <div class="acc-head" onclick="tog('rm',${i})">
        <div class="acc-num" style="background:${r.badge_no_vacancy?'#e53e3e':r.badge_contract?'#1a56db':r.badge_tour?'#22863a':'var(--line)'};color:${(r.badge_no_vacancy||r.badge_contract||r.badge_tour)?'#fff':'var(--muted)'};">${i+1}</div>
        <div class="acc-info"><div class="acc-name">${esc(r.name_ko)}</div><div class="acc-sub">${esc(r.type_en)}</div></div>
        <div style="display:flex;gap:5px;margin-right:8px;">
          ${r.badge_tour?'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#22863a;color:#fff;">투어 가능</span>':''}
          ${r.badge_contract?'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#1a56db;color:#fff;">계약 가능</span>':''}
          ${r.badge_no_vacancy?'<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#e53e3e;color:#fff;">공실 없음</span>':''}
        </div>
        <svg class="chv${openAcc.rm===i?' open':''}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="acc-body${openAcc.rm===i?' open':''}">
        <div style="margin-bottom:14px;"><label style="display:block;margin-bottom:8px;">배지 설정</label>
          <div class="badge-row">
            <div class="btog${r.badge_tour?' on-tour':''}" onclick="roomsData[${i}].badge_tour=!roomsData[${i}].badge_tour;openAcc.rm=${i};renderRooms()">투어 가능 · Tour Available</div>
            <div class="btog${r.badge_contract?' on-contract':''}" onclick="roomsData[${i}].badge_contract=!roomsData[${i}].badge_contract;openAcc.rm=${i};renderRooms()">계약 가능 · Contract Available</div>
            <div class="btog${r.badge_no_vacancy?' on-novacancy':''}" onclick="roomsData[${i}].badge_no_vacancy=!roomsData[${i}].badge_no_vacancy;openAcc.rm=${i};renderRooms()">공실 없음 · No Vacancy</div>
          </div>
        </div>
        <div class="fr"><div class="fg"><label>임대료 (한국어)</label><input type="text" value="${esc(r.rent_ko)}" onchange="roomsData[${i}].rent_ko=this.value"></div><div class="fg"><label>Rent (EN)</label><input type="text" value="${esc(r.rent_en)}" onchange="roomsData[${i}].rent_en=this.value"></div></div>
        <div class="fr"><div class="fg"><label>사진 1 URL</label><input type="url" value="${esc(r.img1)}" onchange="roomsData[${i}].img1=this.value"></div><div class="fg"><label>사진 2 URL</label><input type="url" value="${esc(r.img2)}" onchange="roomsData[${i}].img2=this.value"></div></div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end;"><button class="btn btn-gold btn-sm" onclick="saveRoom(${i})">저장</button></div>
      </div>
    </div>`).join('');}
async function saveRoom(i){const r=roomsData[i];const{error}=await SB.from('anam_rooms').update({badge_tour:r.badge_tour,badge_contract:r.badge_contract,badge_no_vacancy:r.badge_no_vacancy,rent_ko:r.rent_ko,rent_en:r.rent_en,img1:r.img1,img2:r.img2}).eq('id',r.id);if(error)toast('오류: '+error.message,'err');else toast('저장됨','ok');}

/* ── STEPS ── */
async function loadSteps(){const{data}=await SB.from('anam_steps').select('*').order('sort_order');stepsData=data||[];renderSteps();}
function renderSteps(){
  document.getElementById('steps-list').innerHTML=stepsData.map((s,i)=>`
    <div class="acc-item">
      <div class="acc-head" onclick="tog('st',${i})">
        <div class="acc-num" style="${s.is_optional?'background:var(--line);color:var(--muted)':''}">${esc(s.num)}</div>
        <div class="acc-info"><div class="acc-name">${esc(s.title_ko)}</div><div class="acc-sub">${esc(s.title_en)}${s.is_optional?' · 선택':''}</div></div>
        <svg class="chv${openAcc.st===i?' open':''}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="acc-body${openAcc.st===i?' open':''}">
        <div class="fr"><div class="fg"><label>제목 (한국어)</label><input type="text" value="${esc(s.title_ko)}" onchange="stepsData[${i}].title_ko=this.value"></div><div class="fg"><label>Title (EN)</label><input type="text" value="${esc(s.title_en)}" onchange="stepsData[${i}].title_en=this.value"></div></div>
        <div class="fr"><div class="fg"><label>설명 (한국어)</label><textarea onchange="stepsData[${i}].desc_ko=this.value">${esc(s.desc_ko)}</textarea></div><div class="fg"><label>Description (EN)</label><textarea onchange="stepsData[${i}].desc_en=this.value">${esc(s.desc_en)}</textarea></div></div>
        <div style="background:var(--soft);border-radius:10px;padding:12px;margin-top:4px;">
          <label style="display:block;margin-bottom:10px;">버튼 링크 (없으면 비워두세요)</label>
          <div class="fr" style="margin-bottom:8px;"><div class="fg"><label>버튼 텍스트 (한국어)</label><input type="text" value="${esc(s.btn_label_ko)}" onchange="stepsData[${i}].btn_label_ko=this.value"></div><div class="fg"><label>Button Text (EN)</label><input type="text" value="${esc(s.btn_label_en)}" onchange="stepsData[${i}].btn_label_en=this.value"></div></div>
          <div class="fr" style="margin-bottom:0;"><div class="fg"><label>링크 URL (한국어 파일)</label><input type="url" value="${esc(s.btn_url_ko)}" onchange="stepsData[${i}].btn_url_ko=this.value"></div><div class="fg"><label>Link URL (English)</label><input type="url" value="${esc(s.btn_url_en)}" onchange="stepsData[${i}].btn_url_en=this.value"></div></div>
        </div>
        <div class="sw-row" style="margin-top:12px;"><label class="sw"><input type="checkbox" ${s.is_optional?'checked':''} onchange="stepsData[${i}].is_optional=this.checked"><div class="sl"></div></label>선택 사항</div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end;"><button class="btn btn-gold btn-sm" onclick="saveStep(${i})">저장</button></div>
      </div>
    </div>`).join('');}
async function saveStep(i){const s=stepsData[i];const{error}=await SB.from('anam_steps').update({title_ko:s.title_ko,title_en:s.title_en,desc_ko:s.desc_ko,desc_en:s.desc_en,is_optional:s.is_optional,btn_label_ko:s.btn_label_ko,btn_label_en:s.btn_label_en,btn_url_ko:s.btn_url_ko,btn_url_en:s.btn_url_en}).eq('id',s.id);if(error)toast('오류: '+error.message,'err');else toast('저장됨','ok');}

/* ── COLS ── */
async function loadCols(){const{data}=await SB.from('anam_detail_cols').select('*').order('sort_order');colsData=data||[];renderCols();}
function renderCols(){
  document.getElementById('cols-list').innerHTML=colsData.map((c,i)=>`
    <div style="display:flex;gap:10px;align-items:center;padding:10px;background:var(--soft);border-radius:10px;margin-bottom:8px;">
      <div class="fr" style="flex:1;margin-bottom:0;">
        <div class="fg"><label>카테고리명 (한국어)</label><input type="text" value="${esc(c.name_ko)}" onchange="colsData[${i}].name_ko=this.value"></div>
        <div class="fg"><label>Category (EN)</label><input type="text" value="${esc(c.name_en)}" onchange="colsData[${i}].name_en=this.value"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
        <button class="btn btn-outline btn-sm" onclick="moveCol(${i},-1)">↑</button>
        <button class="btn btn-outline btn-sm" onclick="moveCol(${i},1)">↓</button>
      </div>
      <button class="btn btn-gold btn-sm" onclick="saveCol(${i})">저장</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCol(${c.id},${i})">삭제</button>
    </div>`).join('');}
async function addCol(){const{data}=await SB.from('anam_detail_cols').insert({sort_order:colsData.length,col_id:'col_'+Date.now(),name_ko:'새 카테고리',name_en:'New Category'}).select().single();if(data){colsData.push(data);renderCols();}}
async function saveCol(i){const c=colsData[i];await SB.from('anam_detail_cols').update({name_ko:c.name_ko,name_en:c.name_en,sort_order:c.sort_order}).eq('id',c.id);toast('저장됨','ok');}
async function deleteCol(id,i){await SB.from('anam_detail_cols').delete().eq('id',id);colsData.splice(i,1);renderCols();toast('삭제됨');}
async function moveCol(i,dir){const n=i+dir;if(n<0||n>=colsData.length)return;[colsData[i].sort_order,colsData[n].sort_order]=[colsData[n].sort_order,colsData[i].sort_order];await SB.from('anam_detail_cols').update({sort_order:colsData[i].sort_order}).eq('id',colsData[i].id);await SB.from('anam_detail_cols').update({sort_order:colsData[n].sort_order}).eq('id',colsData[n].id);[colsData[i],colsData[n]]=[colsData[n],colsData[i]];renderCols();}

/* ── ITEMS ── */
async function loadItems(){const{data}=await SB.from('anam_detail_items').select('*').order('col_id').order('sort_order');itemsData=data||[];renderItems();}
function renderItems(){
  document.getElementById('items-list').innerHTML=itemsData.map((item,i)=>`
    <div class="acc-item">
      <div class="acc-head" onclick="tog('it',${i})">
        <div class="acc-num" style="font-size:11px;background:var(--soft);color:var(--muted);border:1px solid var(--line);">항목</div>
        <div class="acc-info"><div class="acc-name">${esc(item.title_ko)}</div><div class="acc-sub">${esc((colsData.find(c=>c.col_id===item.col_id)||{}).name_ko||item.col_id)}</div></div>
        <div style="display:flex;gap:4px;margin-right:8px;">
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();moveItem(${i},-1)">↑</button>
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();moveItem(${i},1)">↓</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteItem(${item.id},${i})">삭제</button>
        </div>
        <svg class="chv${openAcc.it===i?' open':''}" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="acc-body${openAcc.it===i?' open':''}">
        <div class="fg" style="margin-bottom:12px;"><label>카테고리</label>
          <select onchange="itemsData[${i}].col_id=this.value">${colsData.map(c=>`<option value="${esc(c.col_id)}"${item.col_id===c.col_id?' selected':''}>${esc(c.name_ko)}</option>`).join('')}</select>
        </div>
        <div class="fr"><div class="fg"><label>제목 (한국어)</label><input type="text" value="${esc(item.title_ko)}" onchange="itemsData[${i}].title_ko=this.value"></div><div class="fg"><label>Title (EN)</label><input type="text" value="${esc(item.title_en)}" onchange="itemsData[${i}].title_en=this.value"></div></div>
        <div class="fr"><div class="fg"><label>한줄 요약 (한국어)</label><input type="text" value="${esc(item.summary_ko)}" onchange="itemsData[${i}].summary_ko=this.value"></div><div class="fg"><label>Summary (EN)</label><input type="text" value="${esc(item.summary_en)}" onchange="itemsData[${i}].summary_en=this.value"></div></div>
        <div class="fr"><div class="fg"><label>상세 내용 (한국어)</label><textarea style="min-height:100px;" onchange="itemsData[${i}].desc_ko=this.value">${esc(item.desc_ko)}</textarea></div><div class="fg"><label>Detail (EN)</label><textarea style="min-height:100px;" onchange="itemsData[${i}].desc_en=this.value">${esc(item.desc_en)}</textarea></div></div>
        <div style="background:var(--soft);border-radius:10px;padding:12px;margin-top:4px;">
          <label style="display:block;margin-bottom:8px;">첨부파일 URL (없으면 버튼 미표시)</label>
          <div class="fr" style="margin-bottom:0;"><div class="fg"><label>한국어 파일</label><input type="url" value="${esc(item.file_url_ko)}" onchange="itemsData[${i}].file_url_ko=this.value"></div><div class="fg"><label>English File</label><input type="url" value="${esc(item.file_url_en)}" onchange="itemsData[${i}].file_url_en=this.value"></div></div>
        </div>
        <div style="margin-top:12px;display:flex;justify-content:flex-end;"><button class="btn btn-gold btn-sm" onclick="saveItem(${i})">저장</button></div>
      </div>
    </div>`).join('');}
async function addItem(){const{data}=await SB.from('anam_detail_items').insert({sort_order:itemsData.length,col_id:(colsData[0]||{}).col_id||'etc',title_ko:'',title_en:'',summary_ko:'',summary_en:'',desc_ko:'',desc_en:'',file_url_ko:'',file_url_en:''}).select().single();if(data){itemsData.push(data);openAcc.it=itemsData.length-1;renderItems();}}
async function saveItem(i){const item=itemsData[i];const{error}=await SB.from('anam_detail_items').update({col_id:item.col_id,title_ko:item.title_ko,title_en:item.title_en,summary_ko:item.summary_ko,summary_en:item.summary_en,desc_ko:item.desc_ko,desc_en:item.desc_en,file_url_ko:item.file_url_ko,file_url_en:item.file_url_en,sort_order:item.sort_order}).eq('id',item.id);if(error)toast('오류: '+error.message,'err');else toast('저장됨','ok');}
async function deleteItem(id,i){await SB.from('anam_detail_items').delete().eq('id',id);itemsData.splice(i,1);renderItems();toast('삭제됨');}
async function moveItem(i,dir){const n=i+dir;if(n<0||n>=itemsData.length)return;[itemsData[i].sort_order,itemsData[n].sort_order]=[itemsData[n].sort_order,itemsData[i].sort_order];await SB.from('anam_detail_items').update({sort_order:itemsData[i].sort_order}).eq('id',itemsData[i].id);await SB.from('anam_detail_items').update({sort_order:itemsData[n].sort_order}).eq('id',itemsData[n].id);[itemsData[i],itemsData[n]]=[itemsData[n],itemsData[i]];renderItems();}

/* ── INIT ── */
async function init(){
  await Promise.all([loadPopup(),loadYT(),loadInfo(),loadSpaces(),loadRooms(),loadSteps()]);
  await loadCols();
  await loadItems();
}
init();
</script>
</body>
</html>
