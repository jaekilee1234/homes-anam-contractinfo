<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | HOMES Anam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;--gray:#6F7A83;--soft:#f6f7f9;--red:#e53e3e;--green:#38a169;--font:'Outfit','Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--soft);color:var(--navy);}
header{background:var(--navy);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;}
.h-left{display:flex;align-items:center;gap:10px;}
.h-logo{color:#fff;font-weight:800;font-size:18px;}
.h-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;}
.h-right{display:flex;gap:8px;}
.btn{font-family:var(--font);font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-ghost-w{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-ghost-w:hover{background:rgba(255,255,255,.2);}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--line);}
.btn-outline:hover{background:var(--soft);}
.btn-danger{background:#fff0f0;color:var(--red);border:1px solid #ffd5d5;}
.btn-danger:hover{background:#ffe0e0;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.tabs{display:flex;border-bottom:2px solid var(--line);padding:0 28px;background:#fff;}
.tab{padding:14px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);}
.main{max-width:920px;margin:0 auto;padding:28px 24px 80px;}
.panel{display:none;}.panel.active{display:block;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.06em;text-transform:uppercase;}
input[type=text],input[type=url],textarea,select{font-family:var(--font);font-size:13px;color:var(--navy);border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:#fff;width:100%;outline:none;transition:border-color .15s;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:var(--navy);}
textarea{min-height:72px;}
.hint{font-size:11px;color:var(--gray);margin-top:3px;}
.sw-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--gray);}
.sw{position:relative;width:38px;height:22px;flex-shrink:0;}
.sw input{display:none;}
.sl{position:absolute;inset:0;background:var(--line);border-radius:22px;cursor:pointer;transition:.2s;}
.sl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;}
.sw input:checked+.sl{background:var(--green);}
.sw input:checked+.sl::before{transform:translateX(16px);}
/* ACC */
.acc-item{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
.acc-head:hover{background:#fafafa;}
.acc-num{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.acc-info{flex:1;}
.acc-name{font-size:14px;font-weight:700;}
.acc-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.acc-body{border-top:1px solid var(--line);padding:18px;display:none;}
.acc-body.open{display:block;}
.chv{transition:transform .2s;color:var(--gray);}
.chv.open{transform:rotate(180deg);}
/* BADGE TOGGLES */
.badge-row{display:flex;gap:10px;flex-wrap:wrap;}
.btog{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);cursor:pointer;font-size:13px;font-weight:700;background:#fff;transition:.15s;user-select:none;}
.btog.on-tour{background:var(--navy);color:#fff;border-color:var(--navy);}
.btog.on-contract{background:var(--gold);color:var(--navy);border-color:var(--gold);}
/* POPUP ITEM */
.pi{display:flex;gap:12px;align-items:flex-start;padding:12px;background:var(--soft);border-radius:10px;margin-bottom:8px;}
.pi-body{flex:1;}
/* SAVE BAR */
.save-bar{display:flex;justify-content:flex-end;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);gap:8px;}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(6px);transition:.22s;z-index:999;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.ok{background:var(--green);}
#toast.err{background:var(--red);}
@media(max-width:600px){.fr{grid-template-columns:1fr;}header,.tabs{padding-left:14px;padding-right:14px;}.main{padding:18px 12px 60px;}}
</style>
</head>
<body>
<header>
  <div class="h-left"><span class="h-logo">HOMES Anam</span><span class="h-badge">ADMIN</span></div>
  <div class="h-right">

    <a class="btn btn-ghost-w" href="index.html" target="_blank">↗ 홈</a>
    <a class="btn btn-ghost-w" href="process.html" target="_blank">↗ 계약단계</a>
    <a class="btn btn-ghost-w" href="info.html" target="_blank">↗ 상세정보</a>

</header>
<div class="tabs">

  <button class="tab" onclick="switchTab('info',this)">상세 정보</button>
</div>
<div class="main">

  <div class="panel active" id="panel-main">
    <div class="card">

    </div>
    <div class="card">
      <div class="card-title">유튜브 영상</div>

    </div>
    <div class="card">
      <div class="card-title">기본 정보 (5행 × 2열)</div>
      <div id="info-rows"></div>
    </div>
    <div class="card">
      <div class="card-title">공용공간</div>
      <div id="spaces-list"></div>
    </div>
    <div class="card">
      <div class="card-title">호실 타입 카드</div>
      <div id="rooms-list"></div>
    </div>
  </div>

  <!-- ── PROCESS PANEL ── -->
  <div class="panel" id="panel-process">
    <div class="card">
      <div class="card-title">계약 단계 (11단계)</div>
      <div id="steps-list"></div>
    </div>
  </div>

  <!-- ── INFO PANEL ── -->
  <div class="panel" id="panel-info">
    <div class="card">
      <div class="card-title">카테고리 관리<button class="btn btn-outline btn-sm" onclick="addCol()">+ 카테고리 추가</button></div>
      <div id="cols-list"></div>
    </div>
    <div class="card">
      <div class="card-title">항목 관리<button class="btn btn-outline btn-sm" onclick="addItem()">+ 항목 추가</button></div>
      <div id="items-list"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

        </div>
        <div class="fr">
          <div class="fg"><label>한줄 요약 (한국어)</label><input type="text" value="${esc(item.summary_ko)}" onchange="D.detail_items[${i}].summary_ko=this.value"></div>
          <div class="fg"><label>Summary (EN)</label><input type="text" value="${esc(item.summary_en)}" onchange="D.detail_items[${i}].summary_en=this.value"></div>
        </div>
        <div class="fr">
          <div class="fg"><label>상세 내용 (한국어)</label><textarea style="min-height:100px;" onchange="D.detail_items[${i}].desc_ko=this.value">${esc(item.desc_ko)}</textarea></div>
          <div class="fg"><label>Detail (EN)</label><textarea style="min-height:100px;" onchange="D.detail_items[${i}].desc_en=this.value">${esc(item.desc_en)}</textarea></div>
        </div>
        <div style="background:var(--soft);border-radius:10px;padding:12px;margin-top:4px;">
          <label style="display:block;margin-bottom:8px;">첨부파일 URL (없으면 버튼 미표시)</label>
          <div class="fr" style="margin-bottom:0;">
            <div class="fg"><label>한국어 파일 URL</label><input type="url" value="${esc(item.file_url_ko)}" placeholder="https://drive.google.com/..." onchange="D.detail_items[${i}].file_url_ko=this.value"></div>
            <div class="fg"><label>English File URL</label><input type="url" value="${esc(item.file_url_en)}" placeholder="https://drive.google.com/..." onchange="D.detail_items[${i}].file_url_en=this.value"></div>
          </div>
        </div>
      </div>
    </div>`).join('');}
function addItem(){D.detail_items.push({id:Date.now(),col_id:(D.detail_cols[0]||{}).id||'etc',order:D.detail_items.length,title_ko:'',title_en:'',summary_ko:'',summary_en:'',desc_ko:'',desc_en:'',file_url_ko:'',file_url_en:''});openAcc.it=D.detail_items.length-1;renderItems();}
function moveItem(i,dir){const a=D.detail_items,n=i+dir;if(n<0||n>=a.length)return;[a[i],a[n]]=[a[n],a[i]];renderItems();}

// ── TOGGLE ──
function tog(type,i){openAcc[type]=openAcc[type]===i?null:i;if(type==='sp')renderSpaces();else if(type==='rm')renderRooms();else if(type==='st')renderSteps();else if(type==='it')renderItems();}

// ── SAVE ──
function saveAll(){D.youtube=ytVal();saveData();toast('저장되었습니다','ok');}

// ── INIT ──
renderPopup();renderYT();renderInfo();renderSpaces();renderRooms();renderSteps();renderCols();renderItems();
</script>
</body>
</html>
