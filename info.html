<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세 정보 | HOMES Anam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;--gray:#6F7A83;--soft:#f8f8f6;--ink:#2d2d2d;--muted:#888;--font:'Outfit','Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--soft);color:var(--ink);-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 48px;}
.nav-logo{font-weight:900;font-size:19px;letter-spacing:-0.04em;color:#1a1a1a;text-decoration:none;}
.nav-logo span{color:#1a1a1a;font-weight:700;}
.nav-links{display:flex;align-items:center;gap:2px;justify-content:center;}
.nav-link{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:.15s;font-family:var(--font);}
.nav-link:hover,.nav-link.active{color:var(--ink);}
.nav-link.active{font-weight:700;}
.lang-toggle{display:flex;gap:2px;background:var(--soft);border-radius:8px;padding:3px;justify-self:end;}
.lang-btn{padding:5px 11px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;}
.lang-btn.active{background:var(--navy);color:#fff;}
.hero{background:var(--navy);padding:44px 48px 36px;}
.hero-badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:11px;font-weight:800;padding:4px 12px;border-radius:6px;letter-spacing:.08em;margin-bottom:14px;}
.hero h1{color:#fff;font-size:26px;font-weight:800;margin-bottom:8px;}
.hero p{color:rgba(255,255,255,.6);font-size:13px;}
.toolbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 48px;display:flex;flex-direction:column;gap:10px;position:sticky;top:64px;z-index:100;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:9px 14px;}
.search-box input{border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--ink);outline:none;flex:1;}
.search-box input::placeholder{color:#B4B2A9;}
.col-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.col-tab{padding:5px 16px;border-radius:18px;border:1px solid var(--line);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);transition:.15s;}
.col-tab:hover{border-color:#aaa;color:var(--ink);}
.col-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.col-tab.all.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.main{max-width:800px;margin:0 auto;padding:32px 48px 80px;}
.count{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:16px;}
.acc{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow .18s;}
.acc:hover{box-shadow:0 2px 12px rgba(0,0,0,.05);}
.acc-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none;}
.col-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
.acc-title{flex:1;font-size:14px;font-weight:700;color:var(--ink);}
.acc-summary-preview{font-size:12px;color:var(--muted);margin-right:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-tag{font-size:10px;font-weight:700;color:var(--muted);background:var(--soft);border:1px solid var(--line);padding:2px 8px;border-radius:4px;flex-shrink:0;}
.chevron{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:#ccc;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.acc-body{border-top:1px solid var(--line);padding:20px;display:none;}
.acc-body.open{display:block;}
.acc-summary-full{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--soft);}
.acc-desc{font-size:13.5px;color:#3a3f52;line-height:1.85;white-space:pre-line;}
.acc-foot{margin-top:16px;padding-top:14px;border-top:1px solid var(--soft);}
.dl-btn{font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-block;}
.dl-btn:hover{background:#0d1460;}
.empty{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
.float-btn{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:40px;background:var(--navy);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(2,4,37,.18);transition:.15s;}
.float-btn:hover{background:#0d1460;transform:translateY(-1px);}
.ko,.en{display:none;}
.lang-ko .ko{display:block;}
.lang-en .en{display:block;}
span.ko,span.en{display:none;}
.lang-ko span.ko{display:inline;}
.lang-en span.en{display:inline;}
@media(max-width:720px){nav,.toolbar{padding-left:20px;padding-right:20px;}.toolbar{top:64px;}.main{padding:24px 20px 60px;}.hero{padding:32px 20px 28px;}}
</style>
</head>
<body class="lang-ko">
<nav>
  <a class="nav-logo" href="index.html">HOMES<span>&nbsp;Anam</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><span class="ko">홈</span><span class="en">Home</span></a>
    <a class="nav-link" href="process.html"><span class="ko">계약 단계</span><span class="en">Process</span></a>
    <a class="nav-link active" href="info.html"><span class="ko">상세 정보</span><span class="en">Info</span></a>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</nav>
<div class="hero">
  <div class="hero-badge">INFO</div>
  <h1><span class="ko">상세 정보</span><span class="en">Detailed Info</span></h1>
  <p><span class="ko">계약 관련 정보</span><span class="en">Contract-related information</span></p>
</div>
<div class="toolbar">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#aaa" stroke-width="1.4"/><path d="M10 10L13.5 13.5" stroke="#aaa" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input type="text" id="search-input" placeholder="제목으로 검색..." oninput="filterItems()">
  </div>
  <div class="col-tabs" id="col-tabs"></div>
</div>
<div class="main">
  <div class="count" id="count"></div>
  <div id="items-list"></div>
</div>
<a class="float-btn" href="mailto:jklee@homes.global">✉ <span class="ko">문의하기</span><span class="en">Contact Us</span></a>
<script>
const SB=supabase.createClient('https://zyeumxtemfmkbpviuxeo.supabase.co','sb_publishable_TuH7QP5ejpplWGn9OiSz3w_joV0ffWJ');
let LANG=localStorage.getItem('homes-lang')||'ko';
let allCols=[],allItems=[],activeCol='all';

function setLang(l){LANG=l;localStorage.setItem('homes-lang',l);document.body.className='lang-'+l;document.getElementById('btn-ko').classList.toggle('active',l==='ko');document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('search-input').placeholder=l==='ko'?'제목으로 검색...':'Search by title...';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const COL_COLORS=['#E6F1FB:#185FA5','#FAEEDA:#854F0B','#EAF3DE:#3B6D11','#EEEDFE:#3C3489','#f6f7f9:#6F7A83'];
function colStyle(idx){const p=COL_COLORS[idx%COL_COLORS.length].split(':');return`background:${p[0]};color:${p[1]}`;}

async function loadData(){
  const[{data:cols},{data:items}]=await Promise.all([
    SB.from('anam_detail_cols').select('*').order('sort_order'),
    SB.from('anam_detail_items').select('*').order('col_id').order('sort_order')
  ]);
  allCols=cols||[];allItems=items||[];
  renderTabs();filterItems();
}

function renderTabs(){
  document.getElementById('col-tabs').innerHTML=`
    <div class="col-tab all active" onclick="setColFilter('all')"><span class="ko">전체</span><span class="en">All</span></div>
    ${allCols.map(c=>`<div class="col-tab" onclick="setColFilter('${c.col_id}')"><span class="ko">${esc(c.name_ko)}</span><span class="en">${esc(c.name_en)}</span></div>`).join('')}`;
  setLang(LANG);
}

function setColFilter(id){
  activeCol=id;
  document.querySelectorAll('.col-tab').forEach(t=>{
    const isAll=t.classList.contains('all');
    t.classList.toggle('active',(id==='all'&&isAll)||(t.getAttribute('onclick')===`setColFilter('${id}')`));
  });
  filterItems();
}

function filterItems(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const colMap={};allCols.forEach((c,i)=>colMap[c.col_id]={...c,idx:i});
  const colOrder={};allCols.forEach((c,i)=>colOrder[c.col_id]=i);
  const filtered=allItems
    .filter(item=>(activeCol==='all'||item.col_id===activeCol)&&(!q||item.title_ko.toLowerCase().includes(q)||item.title_en.toLowerCase().includes(q)))
    .sort((a,b)=>{const co=(colOrder[a.col_id]||0)-(colOrder[b.col_id]||0);return co!==0?co:(a.sort_order||0)-(b.sort_order||0);});

  document.getElementById('count').innerHTML=`<span class="ko">총 ${filtered.length}개 항목</span><span class="en">${filtered.length} items</span>`;
  if(!filtered.length){document.getElementById('items-list').innerHTML=`<div class="empty"><span class="ko">항목이 없습니다.</span><span class="en">No results found.</span></div>`;setLang(LANG);return;}

  document.getElementById('items-list').innerHTML=filtered.map((item,idx)=>{
    const col=colMap[item.col_id]||{name_ko:'기타',name_en:'Other',idx:4};
    const hasFileKo=!!item.file_url_ko,hasFileEn=!!item.file_url_en;
    return`<div class="acc" id="acc-${idx}">
      <div class="acc-head" onclick="toggleAcc(${idx})">
        <span class="col-badge ko" style="${colStyle(col.idx)}">${esc(col.name_ko)}</span>
        <span class="col-badge en" style="${colStyle(col.idx)}">${esc(col.name_en)}</span>
        <span class="acc-title ko">${esc(item.title_ko)}</span>
        <span class="acc-title en">${esc(item.title_en)}</span>
        <span class="acc-summary-preview ko">${esc(item.summary_ko)}</span>
        <span class="acc-summary-preview en">${esc(item.summary_en)}</span>
        ${hasFileKo||hasFileEn?`<span class="attach-tag"><span class="ko">첨부</span><span class="en">File</span></span>`:''}
        <div class="chevron"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
      <div class="acc-body" id="body-${idx}">
        <div class="acc-summary-full ko">${esc(item.summary_ko)}</div>
        <div class="acc-summary-full en">${esc(item.summary_en)}</div>
        <div class="acc-desc ko">${esc(item.desc_ko)}</div>
        <div class="acc-desc en">${esc(item.desc_en)}</div>
        ${hasFileKo||hasFileEn?`<div class="acc-foot">
          ${hasFileKo?`<a class="dl-btn ko" href="${esc(item.file_url_ko)}" target="_blank">첨부파일 보기</a>`:''}
          ${hasFileEn?`<a class="dl-btn en" href="${esc(item.file_url_en)}" target="_blank">View Attachment</a>`:''}
        </div>`:''}
      </div>
    </div>`;}).join('');
  setLang(LANG);
}

function toggleAcc(idx){
  const body=document.getElementById('body-'+idx);
  const chev=document.querySelector(`#acc-${idx} .chevron`);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);chev.classList.toggle('open',!open);
}

setLang(LANG);loadData();
</script>
</body>
</html>
