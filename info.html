<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세 정보 | HOMES Anam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;--gray:#6F7A83;--soft:#f6f7f9;--font:'Outfit','Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--soft);color:var(--navy);}
nav{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--line);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;}
.nav-logo{font-weight:800;font-size:20px;letter-spacing:-0.03em;color:var(--navy);text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--gray);text-decoration:none;transition:.15s;font-family:var(--font);}
.nav-link:hover{background:var(--soft);color:var(--navy);}
.nav-link.active{color:var(--navy);}
.lang-toggle{display:flex;gap:3px;background:var(--soft);border-radius:8px;padding:3px;margin-left:8px;}
.lang-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:700;color:var(--gray);cursor:pointer;transition:.15s;}
.lang-btn.active{background:var(--navy);color:#fff;}
.hero{background:var(--navy);padding:44px 32px 36px;}
.hero-badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:11px;font-weight:800;padding:4px 12px;border-radius:6px;letter-spacing:.08em;margin-bottom:14px;}
.hero h1{color:#fff;font-size:26px;font-weight:800;margin-bottom:8px;}
.hero p{color:rgba(255,255,255,.5);font-size:13px;}
.toolbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 32px;display:flex;flex-direction:column;gap:10px;position:sticky;top:60px;z-index:100;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:9px 14px;}
.search-box input{border:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--navy);outline:none;flex:1;}
.search-box input::placeholder{color:#B4B2A9;}
.col-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.col-tab{padding:5px 16px;border-radius:18px;border:1px solid var(--line);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--gray);transition:.15s;}
.col-tab:hover{border-color:var(--navy);color:var(--navy);}
.col-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.col-tab.all.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.main{max-width:860px;margin:0 auto;padding:32px 32px 80px;}
.count{font-size:12px;color:var(--gray);font-weight:600;margin-bottom:16px;}
.acc{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none;}
.acc-head:hover{background:#fafafa;}
.col-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
.acc-title{flex:1;font-size:14px;font-weight:700;color:var(--navy);}
.acc-summary-preview{font-size:12px;color:var(--gray);margin-right:10px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-tag{font-size:10px;font-weight:700;color:var(--gray);background:var(--soft);border:1px solid var(--line);padding:2px 8px;border-radius:4px;flex-shrink:0;}
.chevron{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:#B4B2A9;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.acc-body{border-top:1px solid var(--line);padding:20px 20px;display:none;}
.acc-body.open{display:block;}
.acc-summary-full{font-size:13px;font-weight:600;color:var(--gray);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--soft);}
.acc-desc{font-size:13.5px;color:#3a3f52;line-height:1.85;white-space:pre-line;}
.acc-foot{margin-top:16px;padding-top:14px;border-top:1px solid var(--soft);}
.dl-btn{font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-block;}
.dl-btn:hover{background:#0a1050;}
.empty{text-align:center;padding:60px 0;color:var(--gray);font-size:14px;}
.ko,.en{display:none;}
.lang-ko .ko{display:block;}
.lang-en .en{display:block;}
span.ko,span.en{display:none;}
.lang-ko span.ko{display:inline;}
.lang-en span.en{display:inline;}
a.float-btn{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:40px;background:var(--navy);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 4px 16px rgba(2,4,37,.2);}
@media(max-width:720px){nav,.toolbar{padding-left:16px;padding-right:16px;}.main{padding:24px 16px 60px;}.hero{padding:32px 16px 28px;}}
</style>
</head>
<body class="lang-ko">
<nav>
  <a class="nav-logo" href="index.html">HOMES <span>Anam</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><span class="ko">홈</span><span class="en">Home</span></a>
    <a class="nav-link" href="process.html"><span class="ko">계약 단계</span><span class="en">Process</span></a>
    <a class="nav-link active" href="info.html"><span class="ko">상세 정보</span><span class="en">Info</span></a>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>
<div class="hero">
  <div class="hero-badge">INFO</div>
  <h1><span class="ko">상세 정보</span><span class="en">Detailed Info</span></h1>
  <p><span class="ko">계약 관련 정보</span><span class="en">Contract-related information</span></p>
</div>
<div class="toolbar">
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#6F7A83" stroke-width="1.4"/><path d="M10 10L13.5 13.5" stroke="#6F7A83" stroke-width="1.4" stroke-linecap="round"/></svg>
    <input type="text" id="search-input" placeholder="제목으로 검색..." oninput="filterItems()">
  </div>
  <div class="col-tabs" id="col-tabs"></div>
</div>
<div class="main">
  <div class="count" id="count"></div>
  <div id="items-list"></div>
</div>
<a class="float-btn" href="mailto:jklee@homes.global">✉ <span class="ko">문의하기</span><span class="en">Contact Us</span></a>
<script>
const D=JSON.parse(localStorage.getItem('homes_data')||'null')||{detail_cols:getDefaultCols(),detail_items:getDefaultItems()};
let LANG=localStorage.getItem('homes-lang')||'ko';
let activeCols=new Set(['all']);
let searchQ='';

function setLang(l){LANG=l;localStorage.setItem('homes-lang',l);document.body.className='lang-'+l;document.getElementById('btn-ko').classList.toggle('active',l==='ko');document.getElementById('btn-en').classList.toggle('active',l==='en');document.getElementById('search-input').placeholder=l==='ko'?'제목으로 검색...':'Search by title...';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const COL_COLORS=['#E6F1FB:#185FA5','#FAEEDA:#854F0B','#EAF3DE:#3B6D11','#EEEDFE:#3C3489','#f6f7f9:#6F7A83'];
function colColor(idx){const p=COL_COLORS[idx%COL_COLORS.length].split(':');return`background:${p[0]};color:${p[1]}`;}

function renderTabs(){
  const cols=getSortedCols();
  document.getElementById('col-tabs').innerHTML=`
    <div class="col-tab all active" onclick="setColFilter('all')"><span class="ko">전체</span><span class="en">All</span></div>
    ${cols.map((c,i)=>`<div class="col-tab" onclick="setColFilter('${c.id}')" style=""><span class="ko">${esc(c.name_ko)}</span><span class="en">${esc(c.name_en)}</span></div>`).join('')}`;
  setLang(LANG);
}

function setColFilter(id){
  activeCols=new Set([id]);
  document.querySelectorAll('.col-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.col-tab').forEach(t=>{
    const isAll=t.classList.contains('all');
    if((id==='all'&&isAll)||t.getAttribute('onclick')===`setColFilter('${id}')`)t.classList.add('active');
  });
  filterItems();
}

function filterItems(){
  searchQ=document.getElementById('search-input').value.toLowerCase().trim();
  const cols=getSortedCols();
  const activeCol=activeCols.has('all')?null:[...activeCols][0];
  const items=getSortedItems();
  const filtered=items.filter(item=>{
    const matchCol=!activeCol||item.col_id===activeCol;
    const matchQ=!searchQ||item.title_ko.toLowerCase().includes(searchQ)||item.title_en.toLowerCase().includes(searchQ);
    return matchCol&&matchQ;
  });
  document.getElementById('count').innerHTML=`<span class="ko">총 ${filtered.length}개 항목</span><span class="en">${filtered.length} items</span>`;
  if(!filtered.length){document.getElementById('items-list').innerHTML=`<div class="empty"><span class="ko">검색 결과가 없습니다.</span><span class="en">No results found.</span></div>`;setLang(LANG);return;}
  const colMap={};cols.forEach((c,i)=>colMap[c.id]={...c,colorIdx:i});
  document.getElementById('items-list').innerHTML=filtered.map((item,idx)=>{
    const col=colMap[item.col_id]||{name_ko:'기타',name_en:'Other',colorIdx:4};
    const hasFileKo=!!item.file_url_ko;
    const hasFileEn=!!item.file_url_en;
    const hasFile=hasFileKo||hasFileEn;
    return`<div class="acc" id="acc-${idx}">
      <div class="acc-head" onclick="toggleAcc(${idx})">
        <span class="col-badge ko" style="${colColor(col.colorIdx)}">${esc(col.name_ko)}</span>
        <span class="col-badge en" style="${colColor(col.colorIdx)}">${esc(col.name_en)}</span>
        <span class="acc-title ko">${esc(item.title_ko)}</span>
        <span class="acc-title en">${esc(item.title_en)}</span>
        <span class="acc-summary-preview ko">${esc(item.summary_ko)}</span>
        <span class="acc-summary-preview en">${esc(item.summary_en)}</span>
        ${hasFile?`<span class="attach-tag"><span class="ko">첨부</span><span class="en">File</span></span>`:''}
        <div class="chevron"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
      <div class="acc-body" id="body-${idx}">
        <div class="acc-summary-full ko">${esc(item.summary_ko)}</div>
        <div class="acc-summary-full en">${esc(item.summary_en)}</div>
        <div class="acc-desc ko">${esc(item.desc_ko)}</div>
        <div class="acc-desc en">${esc(item.desc_en)}</div>
        ${hasFileKo||hasFileEn?`<div class="acc-foot">
          ${hasFileKo?`<a class="dl-btn ko" href="${esc(item.file_url_ko)}" target="_blank">첨부파일 보기</a>`:''}
          ${hasFileEn?`<a class="dl-btn en" href="${esc(item.file_url_en)}" target="_blank">View Attachment</a>`:''}
        </div>`:''}
      </div>
    </div>`;}).join('');
  setLang(LANG);
}

function toggleAcc(idx){
  const body=document.getElementById('body-'+idx);
  const chev=document.querySelector(`#acc-${idx} .chevron`);
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

function getSortedCols(){return(D.detail_cols||getDefaultCols()).slice().sort((a,b)=>(a.order||0)-(b.order||0));}
function getSortedItems(){
  const cols=getSortedCols();
  const colOrder={};cols.forEach((c,i)=>colOrder[c.id]=i);
  return(D.detail_items||getDefaultItems()).slice().sort((a,b)=>{
    const co=(colOrder[a.col_id]||0)-(colOrder[b.col_id]||0);
    return co!==0?co:(a.order||0)-(b.order||0);
  });
}
function getDefaultCols(){return[{id:'contract',name_ko:'계약 조건',name_en:'Contract Terms',order:0},{id:'cost',name_ko:'비용 안내',name_en:'Cost Guide',order:1},{id:'furniture',name_ko:'가구·옵션',name_en:'Furniture & Options',order:2},{id:'etc',name_ko:'기타',name_en:'Other',order:3}];}
function getDefaultItems(){return[{id:1,col_id:'cost',order:0,title_ko:'입금 스케줄 안내',title_en:'Payment Schedule',summary_ko:'계약금, 보증금 잔금, 월 임대료 납부 일정을 정리한 안내',summary_en:'A guide to contract deposit, balance, and monthly rent payment schedule',desc_ko:'각 납부 기한은 입주일 기준으로 산정되며, 입주일이 휴일인 경우 직전 평일을 기준으로 합니다.\n\n자세한 납부 일정은 첨부 파일을 참고해 주세요.',desc_en:'Each payment deadline is based on your move-in date. If it falls on a holiday, the preceding business day applies.\n\nPlease refer to the attached file for the detailed payment schedule.',file_url_ko:'',file_url_en:''},{id:2,col_id:'contract',order:0,title_ko:'보증금 조정 안내',title_en:'Deposit Adjustment',summary_ko:'장기 계약 시 별도 협의 가능',summary_en:'Negotiable for long-term contracts',desc_ko:'보증금은 기본 200만원이며, 장기 계약(6개월 이상) 시 별도 협의가 가능합니다.\n\n조정된 보증금은 계약서에 명시되며, 퇴실 시 원상복구 비용 및 미납 임대료를 제외한 금액이 반환됩니다.',desc_en:'The standard deposit is 2,000,000 KRW. For long-term contracts (6 months+), adjustments may be negotiated.\n\nAny adjusted deposit will be specified in the contract and returned minus restoration costs and outstanding rent.',file_url_ko:'',file_url_en:''}];}

setLang(LANG);
renderTabs();
filterItems();
</script>
</body>
</html>
