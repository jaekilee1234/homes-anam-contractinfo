<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계약 단계 | HOMES Anam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#FFCF0D;--navy:#020425;--cream:#F4F2EC;--line:#E7DDC6;--gray:#6F7A83;--soft:#f8f8f6;--ink:#2d2d2d;--muted:#888;--font:'Outfit','Pretendard',-apple-system,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--soft);color:var(--ink);-webkit-font-smoothing:antialiased;}
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 48px;}
.nav-logo{font-weight:900;font-size:19px;letter-spacing:-0.04em;color:#1a1a1a;text-decoration:none;}
.nav-logo span{color:#1a1a1a;font-weight:700;}
.nav-links{display:flex;align-items:center;gap:2px;justify-content:center;}
.nav-link{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:.15s;font-family:var(--font);}
.nav-link:hover,.nav-link.active{color:var(--ink);}
.nav-link.active{font-weight:700;}
.lang-toggle{display:flex;gap:2px;background:var(--soft);border-radius:8px;padding:3px;justify-self:end;}
.lang-btn{padding:5px 11px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;}
.lang-btn.active{background:var(--navy);color:#fff;}
.hero{background:var(--navy);padding:52px 48px 44px;text-align:center;}
.hero-badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:11px;font-weight:800;padding:4px 12px;border-radius:6px;letter-spacing:.08em;margin-bottom:16px;}
.hero h1{color:#fff;font-size:28px;font-weight:800;margin-bottom:10px;line-height:1.3;}
.hero p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.6;max-width:480px;margin:0 auto;}
.main{max-width:1060px;margin:0 auto;padding:44px 48px 80px;}
.row-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:32px;}
.row-label:first-child{margin-top:0;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px;}
.step-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;transition:box-shadow .18s;}
.step-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);}
.step-card.optional{background:var(--cream);border-style:dashed;}
.step-card.final{border-color:var(--navy);border-width:1.5px;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--gold);color:var(--navy);font-weight:800;font-size:12px;margin-bottom:10px;}
.step-num.opt{background:var(--line);color:var(--gray);}
.step-num.fin{background:var(--navy);color:#fff;}
.opt-badge{position:absolute;top:12px;right:12px;font-size:9px;font-weight:700;color:var(--gray);background:var(--line);padding:2px 7px;border-radius:4px;}
.step-title{font-size:12.5px;font-weight:800;line-height:1.4;margin-bottom:7px;color:var(--ink);}
.step-desc{font-size:11px;color:var(--muted);line-height:1.65;white-space:pre-line;}
.step-btn{display:inline-block;margin-top:10px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;background:var(--soft);color:var(--ink);border:1px solid var(--line);text-decoration:none;}
.step-btn:hover{background:var(--cream);}
.float-btn{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:40px;background:var(--navy);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(2,4,37,.18);transition:.15s;}
.float-btn:hover{background:#0d1460;transform:translateY(-1px);}
.ko,.en{display:none;}
.lang-ko .ko{display:block;}
.lang-en .en{display:block;}
span.ko,span.en{display:none;}
.lang-ko span.ko{display:inline;}
.lang-en span.en{display:inline;}
@media(max-width:720px){nav{padding:0 20px;}.main{padding:28px 20px 60px;}.grid{grid-template-columns:repeat(2,1fr);}.hero{padding:36px 20px 32px;}}
</style>
</head>
<body class="lang-ko">
<nav>
  <a class="nav-logo" href="index.html">HOMES<span>&nbsp;Anam</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html"><span class="ko">홈</span><span class="en">Home</span></a>
    <a class="nav-link active" href="process.html"><span class="ko">계약 단계</span><span class="en">Process</span></a>
    <a class="nav-link" href="info.html"><span class="ko">상세 정보</span><span class="en">Info</span></a>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</nav>
<div class="hero">
  <div class="hero-badge"><span class="ko">계약 진행 절차</span><span class="en">Contract Process</span></div>
  <h1><span class="ko">입주 문의부터 계약 완료까지</span><span class="en">From Inquiry to Move-In</span></h1>
  <p><span class="ko">아래 절차를 따라 진행하시면 빠르고 정확하게 입주 계약을 완료하실 수 있습니다.</span><span class="en">Follow the steps below to complete your lease quickly and smoothly.</span></p>
</div>
<div class="main" id="steps-main"></div>
<a class="float-btn" href="mailto:jklee@homes.global">✉ <span class="ko">문의하기</span><span class="en">Contact Us</span></a>
<script>
const SB=supabase.createClient('https://zyeumxtemfmkbpviuxeo.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5ZXVteHRlbWZta2JwdmlleGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2MDMwMjgsImV4cCI6MjA1ODE3OTAyOH0.tFJdKCexkXwMEAimkRjfRi1f2eoT0DLrFxHHMbdDQaY');
let LANG=localStorage.getItem('homes-lang')||'ko';
function setLang(l){LANG=l;localStorage.setItem('homes-lang',l);document.body.className='lang-'+l;document.getElementById('btn-ko').classList.toggle('active',l==='ko');document.getElementById('btn-en').classList.toggle('active',l==='en');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const ROW_LABELS={ko:['문의 · 확인 단계','계약 체결 단계','확정 · 입주 단계'],en:['Inquiry & Verification','Contract Process','Finalization & Move-In']};
async function renderSteps(){
  const{data}=await SB.from('anam_steps').select('*').order('sort_order');
  if(!data||!data.length)return;
  const rows=[data.slice(0,4),data.slice(4,8),data.slice(8,12)];
  document.getElementById('steps-main').innerHTML=rows.map((row,ri)=>`
    <div class="row-label ko">${ROW_LABELS.ko[ri]||''}</div>
    <div class="row-label en">${ROW_LABELS.en[ri]||''}</div>
    <div class="grid">
      ${row.map(s=>{
        const isOpt=s.is_optional;
        const isFin=s.num==='11';
        const numCls=isOpt?'opt':isFin?'fin':'';
        const cardCls=isOpt?'optional':isFin?'final':'';
        const hasBtnKo=s.btn_label_ko&&s.btn_url_ko;
        const hasBtnEn=s.btn_label_en&&s.btn_url_en;
        return`<div class="step-card ${cardCls}">
          ${isOpt?`<span class="opt-badge"><span class="ko">선택</span><span class="en">Optional</span></span>`:''}
          <div class="step-num ${numCls}">${esc(s.num)}</div>
          <div class="step-title ko">${esc(s.title_ko)}</div>
          <div class="step-title en">${esc(s.title_en)}</div>
          <div class="step-desc ko">${esc(s.desc_ko)}</div>
          <div class="step-desc en">${esc(s.desc_en)}</div>
          ${hasBtnKo?`<a class="step-btn ko" href="${esc(s.btn_url_ko)}" target="_blank">${esc(s.btn_label_ko)} →</a>`:''}
          ${hasBtnEn?`<a class="step-btn en" href="${esc(s.btn_url_en)}" target="_blank">${esc(s.btn_label_en)} →</a>`:''}
        </div>`;
      }).join('')}
      ${row.length<4?Array(4-row.length).fill('<div></div>').join(''):''}
    </div>`).join('');
  setLang(LANG);
}
setLang(LANG);renderSteps();
</script>
</body>
</html>
